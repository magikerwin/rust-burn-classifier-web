name: Deploy WebAssembly to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab (e.g., after uploading new model weights)

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WebAssembly Module
        run: |
          wasm-pack build web --target web --out-dir ../docs/pkg

      # Deploy docs/ directly to gh-pages branch via git.
      # We avoid peaceiris/actions-gh-pages because it internally respects .gitignore
      # and filters out docs/pkg/ which is gitignored in the master branch.
      # Reference: https://github.com/peaceiris/actions-gh-pages/issues/445
      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git rm -rf . --quiet || true
          cp -r docs/. .
          git add -f .
          git commit -m "Deploy to gh-pages [skip ci]" || echo "Nothing to commit"
          git push origin gh-pages
