name: Deploy WebAssembly to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab (e.g., after uploading new model weights)

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WebAssembly Module
        run: |
          wasm-pack build web --target web --out-dir ../docs/pkg

      # Copy all of docs/ into a clean staging directory outside the repo workspace.
      # This bypasses the .gitignore filter that peaceiris/actions-gh-pages applies,
      # ensuring docs/pkg/ (which is gitignored in master) is included in the deployment.
      # Reference: https://github.com/peaceiris/actions-gh-pages/issues/445
      - name: Copy docs to staging directory
        run: |
          mkdir -p /tmp/gh-pages-staging
          cp -r docs/. /tmp/gh-pages-staging/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/gh-pages-staging
